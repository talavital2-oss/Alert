<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Israel Live Alert Map | מפת התרעות בזמן אמת</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- MapLibre GL CSS -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />

  <!-- Google Fonts for Hebrew + English -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>
  <!-- Status Bar -->
  <div id="status-bar">
    <div class="status-left">
      <button id="menu-toggle" class="icon-btn" title="תפריט">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="logo">🛡️ התרעות ישראל</span>
      <span id="connection-status" class="status-dot disconnected">
        <span class="dot"></span>
        <span class="status-text">מתחבר...</span>
      </span>
    </div>
    <div class="status-right">
      <span id="alert-count" class="alert-badge hidden">0</span>
      <button id="sound-toggle" class="icon-btn" title="Toggle alert sound">
        <svg id="sound-icon-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 5L6 9H2v6h4l5 4V5z"/>
          <line x1="23" y1="9" x2="17" y2="15"/>
          <line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
        <svg id="sound-icon-on" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 5L6 9H2v6h4l5 4V5z"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
      <button id="panel-toggle" class="icon-btn" title="Toggle alert panel">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Hamburger Menu Overlay -->
  <div id="menu-overlay" class="menu-overlay hidden"></div>
  <div id="menu-drawer" class="menu-drawer menu-closed">
    <div class="menu-header">
      <span class="menu-title">🛡️ תפריט</span>
      <button id="menu-close" class="icon-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="menu-items">
      <button class="menu-item" data-section="alerts">
        <span class="menu-item-icon">🔴</span>
        <span class="menu-item-label">התרעות אחרונות</span>
        <span class="menu-item-desc">Red alerts in real-time</span>
      </button>
      <button class="menu-item" data-section="impacts">
        <span class="menu-item-icon">🔵</span>
        <span class="menu-item-label">היסטוריית פגיעות</span>
        <span class="menu-item-desc">Impact history — last 12 hours</span>
      </button>
    </div>
  </div>

  <!-- Map -->
  <div id="map"></div>
  <div id="map-gl"></div>

  <!-- Side Panel (dynamic content — alerts or impacts) -->
  <div id="alert-panel" class="panel-open">
    <div class="panel-header">
      <h2 id="panel-title">התרעות אחרונות</h2>
      <span id="panel-alert-count">0 התרעות</span>
    </div>
    <div id="alert-list"></div>
    <div id="impact-list" class="hidden"></div>
    <div id="no-alerts" class="no-alerts">
      <div class="no-alerts-icon">✓</div>
      <p>אין התרעות פעילות</p>
      <p class="no-alerts-sub">No active alerts</p>
    </div>
    <div id="no-impacts" class="no-alerts hidden">
      <div class="no-alerts-icon" style="background:rgba(59,130,246,0.1);color:#3b82f6;">📍</div>
      <p>אין דיווחי פגיעות</p>
      <p class="no-alerts-sub">No impact reports in the last 12 hours</p>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- MapLibre GL JS -->
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <!-- App Modules -->
  <script src="js/sounds.js?v=4"></script>
  <script src="js/map.js?v=4"></script>
  <script src="js/alerts.js?v=4"></script>
  <script src="js/app.js?v=4"></script>
</body>
</html>
